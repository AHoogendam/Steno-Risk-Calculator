<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0b1829"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Risico T1D"/>
  <title>Hart &amp; Nier Risicocalculator — Type 1 Diabetes</title>
  <script>
    const manifest = {
      name:"Hart & Nier Risicocalculator", short_name:"Risico T1D",
      start_url:".", display:"standalone",
      background_color:"#0b1829", theme_color:"#0b1829",
      icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b1829'/><text y='68' x='50' text-anchor='middle' font-size='60'>🫀</text></svg>",sizes:"192x192",type:"image/svg+xml"}]
    };
    const b=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    document.write('<link rel="manifest" href="'+URL.createObjectURL(b)+'">');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans','Helvetica Neue',sans-serif;
      background:linear-gradient(145deg,#0b1829 0%,#162d4a 55%,#0b2035 100%);
      min-height:100vh;min-height:100dvh;padding:24px 12px 60px}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button{opacity:.4}
    input:focus,select:focus{border-color:#3b82f6!important;background:#fff!important;
      box-shadow:0 0 0 3px rgba(59,130,246,.14);outline:none}
    .kaart{background:rgba(255,255,255,.97);border-radius:18px;box-shadow:0 16px 48px rgba(0,0,0,.28)}
    button{cursor:pointer;transition:opacity .15s,transform .1s}
    button:active{transform:scale(.97)}
    #root{max-width:820px;margin:0 auto}
  </style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

// ── MODEL PARAMETERS ─────────────────────────────────────────────────────────

const CVD = {
  alpha:-6.046429053, b_leeftijd:0.040672727, b_vrouw:-0.234111177,
  b_dmduur:0.013062752, b_sbp:0.005814221, b_ldl:0.082287009,
  b_hba1c:0.012209026,  // model gebruikt mmol/mol
  b_micro:0.437359313, b_macro:0.738916137,
  b_egfr_lt40:-0.404318528, b_egfr_ge40:-0.345596046,
  b_roken:0.204224209, b_geenBeweging:0.229279688,
};

const ESKD = {
  alpha:5.748317, b_leeftijd:-0.018850, b_man:0.337922,
  b_dmduur:0.011857, b_egfr:-2.097550,
  b_micro:0.083593, b_macro:0.635484,
  b_sbp:0.007988, b_hba1c:0.010978,  // model gebruikt mmol/mol
  b_roken:0.242820, b_cvd:0.301880,
  sigma:-8.180170, g_man:1.699476, g_dmduur:0.010190,
  g_egfr:-0.248760, g_micro:0.496541, g_macro:0.870400,
  g_sbp:-0.010820, g_hba1c:0.009208, g_roken:0.632938,
  g_cvd:0.655959, g_leeftijd_vrouw:0.086434, g_leeftijd_man:0.065228,
};

// Targetwaarden — HbA1c in % voor weergave, omgerekend voor model
const TARGETS = {
  hba1cPct: 7.0,   // %  (= 53 mmol/mol)
  hba1cMmol: 53,   // mmol/mol
  sbp: 130,
  ldl: 2.5,
};

// ── CONVERSIE & HULPFUNCTIES ─────────────────────────────────────────────────

// HbA1c % → mmol/mol  (IFCC formule: mmol/mol = 10,93 × % − 23,5)
const pctNaarMmol = pct => 10.93 * pct - 23.5;
// HbA1c mmol/mol → %
const mmolNaarPct = mmol => ((mmol + 23.5) / 10.93).toFixed(1);

const n = v => parseFloat(v);

function acrNaarCat(acr, vrouw) {
  const lo = vrouw ? 3.5 : 2.5, hi = vrouw ? 35.0 : 25.0;
  return acr < lo ? "normo" : acr < hi ? "micro" : "macro";
}
function albLabel(acr, vrouw) {
  const c = acrNaarCat(acr, vrouw);
  if (c==="normo") return {tekst:"Normaal", kleur:"#2e7d32"};
  if (c==="micro") return {tekst:"Micro-albuminurie", kleur:"#e65100"};
  return {tekst:"Macro-albuminurie", kleur:"#b71c1c"};
}

// ── BEREKENINGSFUNCTIES ───────────────────────────────────────────────────────
// inv.hba1c is altijd in mmol/mol bij aanroep van deze functies

function berekenCVD(inv, jr) {
  const alb = acrNaarCat(inv.acr, inv.vrouw);
  const micro = alb==="micro"?1:0, macro = alb==="macro"?1:0;
  const egfrT = inv.leeftijd < 40
    ? CVD.b_egfr_lt40 * Math.log2(inv.egfr)
    : CVD.b_egfr_ge40 * Math.log2(inv.egfr);
  const logR = CVD.alpha
    + CVD.b_leeftijd*inv.leeftijd + CVD.b_vrouw*(inv.vrouw?1:0)
    + CVD.b_dmduur*inv.dmDuur + CVD.b_sbp*inv.sbp
    + CVD.b_ldl*inv.ldl + CVD.b_hba1c*inv.hba1c
    + CVD.b_micro*micro + CVD.b_macro*macro + egfrT
    + CVD.b_roken*(inv.roken?1:0)
    + CVD.b_geenBeweging*(inv.bewegen?0:1);
  return (1 - Math.exp(-Math.exp(logR)*jr)) * 100;
}

function berekenESKD(inv, jr) {
  const alb = acrNaarCat(inv.acr, inv.vrouw);
  const micro = alb==="micro"?1:0, macro = alb==="macro"?1:0;
  const man = inv.vrouw?0:1;
  const lE = Math.exp(ESKD.alpha + ESKD.b_leeftijd*inv.leeftijd
    + ESKD.b_man*man + ESKD.b_dmduur*inv.dmDuur
    + ESKD.b_egfr*Math.log2(inv.egfr)
    + ESKD.b_micro*micro + ESKD.b_macro*macro
    + ESKD.b_sbp*inv.sbp + ESKD.b_hba1c*inv.hba1c
    + ESKD.b_roken*(inv.roken?1:0) + ESKD.b_cvd*(inv.eerderCVD?1:0));
  const lD = Math.exp(ESKD.sigma + ESKD.g_man*man
    + ESKD.g_dmduur*inv.dmDuur + ESKD.g_egfr*Math.log2(inv.egfr)
    + ESKD.g_micro*micro + ESKD.g_macro*macro
    + ESKD.g_sbp*inv.sbp + ESKD.g_hba1c*inv.hba1c
    + ESKD.g_roken*(inv.roken?1:0) + ESKD.g_cvd*(inv.eerderCVD?1:0)
    + (inv.vrouw?ESKD.g_leeftijd_vrouw:ESKD.g_leeftijd_man)*inv.leeftijd);
  const tot = lE+lD;
  return (lE/tot)*(1-Math.exp(-tot*jr))*100;
}

// ── RISICOKLEUR ───────────────────────────────────────────────────────────────

function risicoKleur(pct, leeftijd) {
  const lft = parseFloat(leeftijd)||50;
  if (lft < 50) {
    if (pct < 2.5) return {bg:"#e8f5e9", text:"#2e7d32", label:"Laag"};
    if (pct < 7.5) return {bg:"#fff8e1", text:"#f57f17", label:"Matig"};
    return {bg:"#fce4ec", text:"#b71c1c", label:"Hoog"};
  } else if (lft < 70) {
    if (pct < 5)  return {bg:"#e8f5e9", text:"#2e7d32", label:"Laag"};
    if (pct < 10) return {bg:"#fff8e1", text:"#f57f17", label:"Matig"};
    return {bg:"#fce4ec", text:"#b71c1c", label:"Hoog"};
  } else {
    if (pct < 15) return {bg:"#fff8e1", text:"#f57f17", label:"Matig"};
    return {bg:"#fce4ec", text:"#b71c1c", label:"Hoog"};
  }
}

// ── TARGET ADVIEZEN ───────────────────────────────────────────────────────────
// inv hier heeft hba1c nog als %-string; basis omzetten naar mmol/mol

function berekenTargetAdvies(inv, cvd10Huidig) {
  const hba1cMmol = pctNaarMmol(n(inv.hba1c));
  const basis = {
    leeftijd:n(inv.leeftijd), vrouw:inv.vrouw, dmDuur:n(inv.dmDuur),
    sbp:n(inv.sbp), ldl:n(inv.ldl), hba1c:hba1cMmol,
    acr:n(inv.acr), egfr:n(inv.egfr),
    roken:inv.roken, bewegen:inv.bewegen, eerderCVD:inv.eerderCVD,
  };

  const adviezen = [];
  const check = (label, opTarget, beschrijving, targetOverride) => {
    if (!opTarget) {
      const nieuw = berekenCVD({...basis, ...targetOverride}, 10);
      adviezen.push({label, beschrijving, reductie:cvd10Huidig-nieuw, cvd10Nieuw:nieuw});
    }
  };

  check("HbA1c",
    hba1cMmol <= TARGETS.hba1cMmol,
    `Uw HbA1c is ${n(inv.hba1c).toFixed(1)}% (${Math.round(hba1cMmol)} mmol/mol). Verlagen naar ≤7,0% (53 mmol/mol) verlaagt uw hartrisico.`,
    {hba1c: TARGETS.hba1cMmol});

  check("Bloeddruk",
    n(inv.sbp) <= TARGETS.sbp,
    `Uw bloeddruk is ${inv.sbp} mmHg. Een streefwaarde van ≤130 mmHg verlaagt uw risico aanzienlijk.`,
    {sbp: TARGETS.sbp});

  check("LDL-cholesterol",
    n(inv.ldl) <= TARGETS.ldl,
    `Uw LDL is ${inv.ldl} mmol/L. Verlaging naar ≤2,5 mmol/L (bijv. met statines) heeft een meetbaar effect.`,
    {ldl: TARGETS.ldl});

  check("Stoppen met roken",
    !inv.roken,
    `U rookt. Stoppen met roken is de meest effectieve leefstijlaanpassing die u kunt maken.`,
    {roken: false});

  check("Regelmatig bewegen",
    inv.bewegen,
    `U beweegt niet regelmatig. Minimaal 30 minuten per dag matig intensief bewegen verlaagt uw hartrisico.`,
    {bewegen: true});

  return adviezen.sort((a,b) => b.reductie - a.reductie);
}

// ── UI COMPONENTEN ────────────────────────────────────────────────────────────

function Meter({pct, label, sublabel, leeftijd}) {
  const k = risicoKleur(pct, leeftijd);
  const omtrek = Math.PI*54;
  const streep = (Math.min(Math.max(pct,0),100)/100)*omtrek;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",
      background:k.bg,borderRadius:16,padding:"16px 12px 12px",
      minWidth:110,flex:1,border:`1.5px solid ${k.text}28`}}>
      <svg width={120} height={66} viewBox="0 0 124 68">
        <path d="M 7 63 A 55 55 0 0 1 117 63" fill="none" stroke="#e0e0e0" strokeWidth={9} strokeLinecap="round"/>
        <path d="M 7 63 A 55 55 0 0 1 117 63" fill="none" stroke={k.text} strokeWidth={9} strokeLinecap="round"
          strokeDasharray={`${streep} ${omtrek}`}/>
        <text x="62" y="56" textAnchor="middle"
          style={{fontSize:20,fontWeight:800,fill:k.text,fontFamily:"'DM Serif Display',serif"}}>
          {pct.toFixed(1)}%
        </text>
      </svg>
      <div style={{fontSize:11,fontWeight:700,color:k.text,letterSpacing:"0.07em",textTransform:"uppercase"}}>{k.label}</div>
      <div style={{fontSize:12,fontWeight:600,color:"#2d3748",marginTop:3,textAlign:"center"}}>{label}</div>
      <div style={{fontSize:11,color:"#a0aec0",marginTop:1}}>{sublabel}</div>
    </div>
  );
}

function Veld({label, hint, fout, children}) {
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4a5568",
        letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>
        {label}
        {hint && <span style={{fontWeight:400,textTransform:"none",color:"#a0aec0",marginLeft:5}}>{hint}</span>}
      </label>
      {children}
      {fout && <div style={{color:"#e53935",fontSize:11,marginTop:3}}>⚠ {fout}</div>}
    </div>
  );
}

const iS = {width:"100%",padding:"10px 11px",borderRadius:8,
  border:"1.5px solid #dde1e7",fontSize:15,color:"#1a202c",
  background:"#f9fafb",fontFamily:"inherit"};

function Schakelaar({waarde, onChange, opties}) {
  return (
    <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1.5px solid #dde1e7"}}>
      {opties.map(o=>(
        <button key={o.w} onClick={()=>onChange(o.w)} style={{
          flex:1,padding:"10px 4px",fontSize:13,fontWeight:600,
          border:"none",fontFamily:"inherit",
          background:waarde===o.w?"#1a3a5c":"#f9fafb",
          color:waarde===o.w?"#fff":"#4a5568",
        }}>{o.l}</button>
      ))}
    </div>
  );
}

function SectieTitel({icoon, tekst}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:7,margin:"18px 0 11px"}}>
      <span style={{fontSize:15}}>{icoon}</span>
      <span style={{fontSize:10,fontWeight:700,color:"#1a3a5c",letterSpacing:"0.12em",textTransform:"uppercase"}}>{tekst}</span>
      <div style={{flex:1,height:1,background:"#e2e8f0",marginLeft:4}}/>
    </div>
  );
}

// ── HOOFDAPP ──────────────────────────────────────────────────────────────────

const STANDAARD = {
  leeftijd:"50", vrouw:false, dmDuur:"15",
  sbp:"130", ldl:"2.8",
  hba1c:"7.0",   // invoer in %
  acr:"1.5", egfr:"90",
  roken:false, bewegen:true, eerderCVD:false,
};

function App() {
  const [inv, setInv] = useState(STANDAARD);
  const [berekend, setBerekend] = useState(false);
  const [res, setRes] = useState(null);
  const [fouten, setFouten] = useState({});

  const stel = k => e => {
    setInv(p=>({...p,[k]:e.target?e.target.value:e}));
    setBerekend(false);
  };

  const valideer = () => {
    const f={};
    const l=n(inv.leeftijd);  if(isNaN(l)||l<25||l>69)    f.leeftijd="25–69 jaar vereist";
    const d=n(inv.dmDuur);    if(isNaN(d)||d<0||d>70)     f.dmDuur="0–70 jaar";
    const s=n(inv.sbp);       if(isNaN(s)||s<80||s>220)   f.sbp="80–220 mmHg";
    const ld=n(inv.ldl);      if(isNaN(ld)||ld<0.5||ld>12) f.ldl="0,5–12 mmol/L";
    const h=n(inv.hba1c);     if(isNaN(h)||h<4||h>18)     f.hba1c="4–18%";
    const a=n(inv.acr);       if(isNaN(a)||a<0||a>500)    f.acr="0–500 mg/mmol";
    const e=n(inv.egfr);      if(isNaN(e)||e<5||e>200)    f.egfr="5–200 mL/min/1,73m²";
    return f;
  };

  const bereken = () => {
    const f=valideer(); setFouten(f);
    if(Object.keys(f).length>0) return;

    // Bouw numeriek invoer-object; hba1c omzetten van % naar mmol/mol
    const hba1cMmol = pctNaarMmol(n(inv.hba1c));
    const i = {
      leeftijd:n(inv.leeftijd), vrouw:inv.vrouw, dmDuur:n(inv.dmDuur),
      sbp:n(inv.sbp), ldl:n(inv.ldl), hba1c:hba1cMmol,
      acr:n(inv.acr), egfr:n(inv.egfr),
      roken:inv.roken, bewegen:inv.bewegen, eerderCVD:inv.eerderCVD,
    };

    const cvd10 = berekenCVD(i, 10);

    // Optimale patiënt: alle targets bereikt
    const iOptim = {...i,
      sbp:Math.min(i.sbp, TARGETS.sbp),
      ldl:Math.min(i.ldl, TARGETS.ldl),
      hba1c:Math.min(i.hba1c, TARGETS.hba1cMmol),
      roken:false, bewegen:true,
    };
    const cvd10Optim = berekenCVD(iOptim, 10);

    setRes({
      cvd5:berekenCVD(i,5), cvd10, cvd30:berekenCVD(i,30),
      eskd5:berekenESKD(i,5),
      cvd10Optim,
      hba1cMmol: Math.round(hba1cMmol),
      adviezen:berekenTargetAdvies(inv, cvd10),
    });
    setBerekend(true);
    setTimeout(()=>document.getElementById("res")?.scrollIntoView({behavior:"smooth",block:"start"}),100);
  };

  const herstel = () => { setInv(STANDAARD); setBerekend(false); setRes(null); setFouten({}); };

  const acrNum = n(inv.acr);
  const albI = albLabel(isNaN(acrNum)?0:acrNum, inv.vrouw);
  // Live mmol/mol conversie voor weergave
  const hba1cLive = n(inv.hba1c);
  const hba1cMmolLive = !isNaN(hba1cLive) && hba1cLive >= 4 ? Math.round(pctNaarMmol(hba1cLive)) : null;

  const grid = {display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(145px,1fr))",gap:12};

  return (
    <div>
      {/* Koptekst */}
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{color:"#60a5fa",fontSize:10,fontWeight:700,letterSpacing:"0.2em",
          textTransform:"uppercase",marginBottom:7}}>Type 1 Diabetes · Steno Risicomodel</div>
        <h1 style={{fontFamily:"'DM Serif Display',serif",color:"#fff",
          fontSize:"clamp(22px,5vw,36px)",fontWeight:400,lineHeight:1.15,marginBottom:8}}>
          Hart- &amp; Nierziekte<br/>Risicocalculator
        </h1>
        <p style={{color:"#93b8d8",fontSize:13,maxWidth:440,margin:"0 auto",lineHeight:1.6}}>
          Berekent 5, 10 en 30-jaars HVZ-risico en 5-jaars ESKD-risico
          voor patiënten van 25–69 jaar met type 1 diabetes.
        </p>
      </div>

      {/* ── INVOERKAART ── */}
      <div className="kaart" style={{padding:"20px 18px 16px",marginBottom:16}}>

        <SectieTitel icoon="👤" tekst="Patiëntprofiel"/>
        <div style={grid}>
          <Veld label="Leeftijd" hint="(25–69 jr)" fout={fouten.leeftijd}>
            <input type="number" value={inv.leeftijd} min={25} max={69}
              onChange={stel("leeftijd")}
              style={{...iS,borderColor:fouten.leeftijd?"#e53935":"#dde1e7"}}/>
          </Veld>
          <Veld label="Geslacht">
            <Schakelaar waarde={inv.vrouw?"vrouw":"man"}
              onChange={v=>{setInv(p=>({...p,vrouw:v==="vrouw"}));setBerekend(false);}}
              opties={[{w:"man",l:"Man"},{w:"vrouw",l:"Vrouw"}]}/>
          </Veld>
          <Veld label="DM-duur" hint="(jaren)" fout={fouten.dmDuur}>
            <input type="number" value={inv.dmDuur} min={0} max={70}
              onChange={stel("dmDuur")}
              style={{...iS,borderColor:fouten.dmDuur?"#e53935":"#dde1e7"}}/>
          </Veld>
        </div>

        <SectieTitel icoon="🔬" tekst="Klinische metingen"/>
        <div style={grid}>
          <Veld label="Systolische BD" hint="(mmHg)" fout={fouten.sbp}>
            <input type="number" value={inv.sbp} onChange={stel("sbp")}
              style={{...iS,borderColor:fouten.sbp?"#e53935":"#dde1e7"}}/>
          </Veld>
          <Veld label="LDL-cholesterol" hint="(mmol/L)" fout={fouten.ldl}>
            <input type="number" value={inv.ldl} step={0.1} onChange={stel("ldl")}
              style={{...iS,borderColor:fouten.ldl?"#e53935":"#dde1e7"}}/>
          </Veld>
          <Veld label="HbA1c" hint="(%)" fout={fouten.hba1c}>
            <input type="number" value={inv.hba1c} step={0.1} onChange={stel("hba1c")}
              style={{...iS,borderColor:fouten.hba1c?"#e53935":"#dde1e7"}}/>
            {hba1cMmolLive !== null && (
              <div style={{fontSize:11,marginTop:4,color:"#64748b"}}>
                = <strong>{hba1cMmolLive} mmol/mol</strong>
              </div>
            )}
          </Veld>
          <Veld label="eGFR" hint="(mL/min/1,73m²)" fout={fouten.egfr}>
            <input type="number" value={inv.egfr} onChange={stel("egfr")}
              style={{...iS,borderColor:fouten.egfr?"#e53935":"#dde1e7"}}/>
          </Veld>
          <Veld label="ACR" hint="(mg/mmol)" fout={fouten.acr}>
            <input type="number" value={inv.acr} step={0.1} min={0} onChange={stel("acr")}
              style={{...iS,borderColor:fouten.acr?"#e53935":"#dde1e7"}}/>
            {!fouten.acr && inv.acr !== "" && (
              <div style={{fontSize:11,marginTop:4,fontWeight:600,color:albI.kleur}}>→ {albI.tekst}</div>
            )}
          </Veld>
        </div>

        <SectieTitel icoon="⚠️" tekst="Risicofactoren"/>
        <div style={grid}>
          <Veld label="Roken">
            <Schakelaar waarde={inv.roken?"ja":"nee"}
              onChange={v=>{setInv(p=>({...p,roken:v==="ja"}));setBerekend(false);}}
              opties={[{w:"nee",l:"Nee"},{w:"ja",l:"Ja"}]}/>
          </Veld>
          <Veld label="Regelmatig bewegen" hint="(≥30 min/dag)">
            <Schakelaar waarde={inv.bewegen?"ja":"nee"}
              onChange={v=>{setInv(p=>({...p,bewegen:v==="ja"}));setBerekend(false);}}
              opties={[{w:"ja",l:"Ja"},{w:"nee",l:"Nee"}]}/>
          </Veld>
          <Veld label="Eerder HVZ">
            <Schakelaar waarde={inv.eerderCVD?"ja":"nee"}
              onChange={v=>{setInv(p=>({...p,eerderCVD:v==="ja"}));setBerekend(false);}}
              opties={[{w:"nee",l:"Nee"},{w:"ja",l:"Ja"}]}/>
          </Veld>
        </div>

        <div style={{display:"flex",gap:10,marginTop:18}}>
          <button onClick={bereken} style={{
            flex:1,padding:"14px 0",borderRadius:10,border:"none",
            background:"linear-gradient(135deg,#1a3a5c,#2563a8)",
            color:"#fff",fontSize:16,fontWeight:700,fontFamily:"inherit",
            boxShadow:"0 4px 18px rgba(37,99,168,.38)"}}>
            Bereken risico
          </button>
          <button onClick={herstel} style={{
            padding:"14px 18px",borderRadius:10,
            border:"1.5px solid #dde1e7",background:"#f9fafb",
            color:"#4a5568",fontSize:14,fontWeight:600,fontFamily:"inherit"}}>
            Wissen
          </button>
        </div>
      </div>

      {/* ── RESULTATEN ── */}
      {berekend && res && (
        <div id="res">

          {/* HVZ meters */}
          <div className="kaart" style={{padding:"20px 18px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:38,height:38,borderRadius:"50%",
                background:"linear-gradient(135deg,#b91c1c,#ef4444)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:19,flexShrink:0}}>❤️</div>
              <div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#111"}}>
                  Hart- en vaatziekten (HVZ)
                </div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>
                  Ischemische hartziekte · Beroerte · Hartfalen · PAV
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Meter pct={res.cvd5}  label="5-jaarsrisico"  sublabel="HVZ" leeftijd={inv.leeftijd}/>
              <Meter pct={res.cvd10} label="10-jaarsrisico" sublabel="HVZ" leeftijd={inv.leeftijd}/>
              <Meter pct={res.cvd30} label="30-jaarsrisico" sublabel="HVZ" leeftijd={inv.leeftijd}/>
            </div>
          </div>

          {/* ESKD */}
          <div className="kaart" style={{padding:"20px 18px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:38,height:38,borderRadius:"50%",
                background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:19,flexShrink:0}}>🫘</div>
              <div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#111"}}>
                  Eindstadium nierziekte (ESKD)
                </div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>Concurrerende risico's model</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"stretch"}}>
              <Meter pct={res.eskd5} label="5-jaarsrisico" sublabel="ESKD" leeftijd={inv.leeftijd}/>
              <div style={{flex:2,minWidth:180,background:"#f0f5ff",borderRadius:12,
                padding:"12px 14px",border:"1px solid #c7d7f8",
                fontSize:12,color:"#334155",lineHeight:1.7}}>
                <div style={{fontWeight:700,color:"#1e3a6e",marginBottom:4}}>Methodologie</div>
                Houdt rekening met het concurrerende risico op overlijden zonder ESKD.
                <div style={{fontSize:11,color:"#475569",borderTop:"1px solid #dbeafe",paddingTop:6,marginTop:6}}>
                  ACR {inv.acr} mg/mmol →{" "}
                  <strong style={{color:albI.kleur}}>{albI.tekst}</strong>
                  <span style={{color:"#94a3b8",marginLeft:4}}>
                    (grens: {inv.vrouw?"3,5 / 35":"2,5 / 25"} mg/mmol)
                  </span>
                </div>
              </div>
            </div>
          </div>

          {/* ── INFOGRAPHIC: 2 kolommen ── */}
          <div className="kaart" style={{padding:"20px 18px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:38,height:38,borderRadius:"50%",
                background:"linear-gradient(135deg,#7c3aed,#a855f7)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:19,flexShrink:0}}>📊</div>
              <div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#111"}}>
                  Vergelijking 10-jaars hartrisico
                </div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>
                  Huidige situatie vs. alle behandeldoelen bereikt
                </div>
              </div>
            </div>

            {(() => {
              const lft = n(inv.leeftijd);
              const kolommen = [
                {
                  titel:"U nu",
                  subtitel:"Type 1 diabetes, huidige waarden",
                  risico:res.cvd10,
                  kleur:"#1a3a5c",
                  achtergrond:"linear-gradient(160deg,#eff6ff,#dbeafe)",
                  rand:"#93c5fd",
                  icoon:"🧑",
                  details:[
                    {l:"HbA1c", w:`${n(inv.hba1c).toFixed(1)}% (${res.hba1cMmol} mmol/mol)`},
                    {l:"Bloeddruk", w:`${n(inv.sbp)} mmHg`},
                    {l:"LDL", w:`${n(inv.ldl)} mmol/L`},
                    {l:"ACR", w:`${inv.acr} mg/mmol → ${albI.tekst}`},
                    {l:"Roken", w:inv.roken?"Ja":"Nee"},
                    {l:"Bewegen", w:inv.bewegen?"Ja":"Nee"},
                  ],
                },
                {
                  titel:"U op target",
                  subtitel:"Alle behandeldoelen bereikt",
                  risico:res.cvd10Optim,
                  kleur:"#059669",
                  achtergrond:"linear-gradient(160deg,#f0fdf4,#bbf7d0)",
                  rand:"#6ee7b7",
                  icoon:"🎯",
                  details:[
                    {l:"HbA1c", w:`≤7,0% (≤53 mmol/mol)`},
                    {l:"Bloeddruk", w:"≤130 mmHg"},
                    {l:"LDL", w:"≤2,5 mmol/L"},
                    {l:"ACR", w:`${inv.acr} mg/mmol → ${albI.tekst}`},
                    {l:"Roken", w:"Nee"},
                    {l:"Bewegen", w:"Ja"},
                  ],
                },
              ];
              const maxR = Math.max(kolommen[0].risico, kolommen[1].risico, 1);
              const reductie = res.cvd10 - res.cvd10Optim;

              return (
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    {kolommen.map((k,idx)=>{
                      const cat = risicoKleur(k.risico, lft);
                      return (
                        <div key={idx} style={{
                          background:k.achtergrond, border:`1.5px solid ${k.rand}`,
                          borderRadius:16, padding:"18px 16px 14px",
                          display:"flex", flexDirection:"column", alignItems:"center",
                        }}>
                          <div style={{fontSize:24,marginBottom:5}}>{k.icoon}</div>
                          <div style={{fontSize:13,fontWeight:700,color:"#1f2937",
                            textAlign:"center",marginBottom:2}}>{k.titel}</div>
                          <div style={{fontSize:10,color:"#6b7280",textAlign:"center",
                            marginBottom:12,lineHeight:1.3}}>{k.subtitel}</div>

                          {/* Risicogetal */}
                          <div style={{fontSize:32,fontWeight:800,color:k.kleur,
                            fontFamily:"'DM Serif Display',serif",lineHeight:1}}>
                            {k.risico.toFixed(1)}%
                          </div>
                          <div style={{fontSize:11,fontWeight:600,color:cat.text,
                            background:cat.bg,borderRadius:99,padding:"3px 10px",
                            marginTop:5,border:`1px solid ${cat.text}44`,marginBottom:12}}>
                            {cat.label}
                          </div>

                          {/* Balk */}
                          <div style={{width:"85%",background:"#e5e7eb",
                            borderRadius:8,height:8,overflow:"hidden",marginBottom:14}}>
                            <div style={{height:"100%",borderRadius:8,background:k.kleur,
                              width:`${Math.round((k.risico/maxR)*100)}%`}}/>
                          </div>

                          {/* Details */}
                          <div style={{width:"100%",borderTop:`1px solid ${k.rand}`,
                            paddingTop:10,display:"flex",flexDirection:"column",gap:4}}>
                            {k.details.map((d,di)=>(
                              <div key={di} style={{display:"flex",
                                justifyContent:"space-between",fontSize:11,gap:8}}>
                                <span style={{color:"#6b7280",flexShrink:0}}>{d.l}</span>
                                <span style={{fontWeight:600,color:"#1f2937",textAlign:"right"}}>{d.w}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Samenvatting — gebaseerd op adviezen, niet op afgeronde reductie */}
                  {res.adviezen.length > 0 ? (
                    <div style={{background:"linear-gradient(135deg,#ecfdf5,#d1fae5)",
                      borderRadius:12,padding:"12px 16px",border:"1px solid #6ee7b7",
                      fontSize:13,color:"#065f46",lineHeight:1.6}}>
                      <strong>💡 Potentiële winst:</strong>{" "}
                      Als alle behandeldoelen worden bereikt, daalt uw 10-jaars hartrisico van{" "}
                      <strong>{res.cvd10.toFixed(1)}%</strong> naar{" "}
                      <strong>{res.cvd10Optim.toFixed(1)}%</strong> — een verlaging van{" "}
                      <strong>{reductie.toFixed(1)} procentpunt</strong>.
                    </div>
                  ) : (
                    <div style={{background:"linear-gradient(135deg,#ecfdf5,#d1fae5)",
                      borderRadius:12,padding:"12px 16px",border:"1px solid #6ee7b7",
                      fontSize:13,color:"#065f46"}}>
                      ✅ Alle risicofactoren zijn reeds op target.
                    </div>
                  )}
                </div>
              );
            })()}
          </div>

          {/* Behandeladviezen */}
          {res.adviezen.length > 0 && (
            <div className="kaart" style={{padding:"20px 18px",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{width:38,height:38,borderRadius:"50%",
                  background:"linear-gradient(135deg,#065f46,#059669)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:19,flexShrink:0}}>🎯</div>
                <div>
                  <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"#111"}}>
                    Wat kunt u verbeteren?
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>
                    Effect per maatregel op uw 10-jaars hartrisico (nu: {res.cvd10.toFixed(1)}%)
                  </div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {res.adviezen.map((adv,i)=>{
                  const breedte = Math.min(100,Math.round((adv.reductie/res.cvd10)*100));
                  return (
                    <div key={i} style={{background:"#f8fafb",borderRadius:12,
                      padding:"12px 14px",border:"1px solid #e2e8f0"}}>
                      <div style={{display:"flex",justifyContent:"space-between",
                        alignItems:"flex-start",marginBottom:6}}>
                        <div style={{fontWeight:700,fontSize:13,color:"#1a202c"}}>{adv.label}</div>
                        <div style={{fontWeight:800,fontSize:14,color:"#1d4ed8",
                          whiteSpace:"nowrap",marginLeft:10}}>
                          −{adv.reductie.toFixed(1)}%
                        </div>
                      </div>
                      <div style={{fontSize:12,color:"#475569",lineHeight:1.55,marginBottom:8}}>
                        {adv.beschrijving}
                      </div>
                      <div style={{background:"#e2e8f0",borderRadius:99,height:6,overflow:"hidden"}}>
                        <div style={{width:`${breedte}%`,height:"100%",
                          background:"#2563a8",borderRadius:99}}/>
                      </div>
                      <div style={{fontSize:10,color:"#94a3b8",marginTop:4}}>
                        Nieuw 10-jaarsrisico bij target:{" "}
                        <strong style={{color:"#334155"}}>{adv.cvd10Nieuw.toFixed(1)}%</strong>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Legenda */}
          <div className="kaart" style={{padding:"12px 18px",marginBottom:14}}>
            <div style={{marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:700,color:"#94a3b8",
                textTransform:"uppercase",letterSpacing:"0.1em"}}>
                Risicocategorieën 10-jaars HVZ (leeftijdsafhankelijk):
              </span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4,fontSize:12,color:"#475569"}}>
              <div><strong style={{color:"#1a202c"}}>&lt;50 jaar:</strong> Laag &lt;2,5% · Matig 2,5–7,5% · Hoog ≥7,5%</div>
              <div><strong style={{color:"#1a202c"}}>50–69 jaar:</strong> Laag &lt;5% · Matig 5–10% · Hoog ≥10%</div>
              <div><strong style={{color:"#1a202c"}}>≥70 jaar:</strong> Matig &lt;15% · Hoog ≥15%</div>
            </div>
            <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}}>
              {[{l:"Laag",bg:"#e8f5e9",t:"#2e7d32"},{l:"Matig",bg:"#fff8e1",t:"#f57f17"},{l:"Hoog",bg:"#fce4ec",t:"#b71c1c"}].map(c=>(
                <div key={c.l} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:11,height:11,borderRadius:3,background:c.bg,border:`1.5px solid ${c.t}`}}/>
                  <span style={{fontSize:12}}><strong>{c.l}</strong></span>
                </div>
              ))}
            </div>
          </div>

          <p style={{color:"#5a7a96",fontSize:11,textAlign:"center",lineHeight:1.6,padding:"0 6px"}}>
            Gebaseerd op Steno Diabetes Center Copenhagen voorspellingsmodellen voor type 1 diabetes (leeftijd 25–69 jaar).
            Uitsluitend bedoeld als klinische beslissingsondersteuning — geen vervanging voor klinisch oordeel.
          </p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    const sw=`const C='rv2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add(self.location.href))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request)))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
  }
</script>
</body>
</html>
